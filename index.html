<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="地球 3D 無人機巡視，沿著全球 50 個知名自然與人文地景飛行探索。" />
    <meta property="og:locale" content="zh_TW" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="地球 3D 無人機地景巡視" />
    <meta property="og:title" content="地球 3D 無人機地景巡視" />
    <meta property="og:description" content="用無人機視角探索世界 50 個代表地景。" />
    <title>地球 3D 無人機地景巡視</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <main class="flight-app nav-collapsed" aria-label="地球 3D 無人機地景巡視互動體驗">
      <div id="earthMap" aria-label="MapLibre 3D 真實衛星地球"></div>

      <button id="navToggle" class="nav-toggle" type="button" aria-controls="cityPanel" aria-expanded="false" title="展開地景清單">☰</button>

      <section class="hud action-panel" aria-label="地球巡視控制">
        <button id="tourButton" type="button" title="自動巡航">▶ 自動巡航</button>
        <button id="nightButton" type="button" title="切換日夜模式">◐ 日夜模式</button>
        <button id="homeButton" type="button" title="返回地球鳥瞰">◎ 地球鳥瞰</button>
      </section>

      <section class="hud speed-panel" aria-label="飛行速度">
        <label class="range-control" for="speedRange">
          <span>飛行速度</span>
          <input id="speedRange" type="range" min="0.4" max="2.4" value="1" step="0.1" />
        </label>
        <label class="range-control" for="terrainRange">
          <span>地形高度</span>
          <input id="terrainRange" type="range" min="0.4" max="2.8" value="1.45" step="0.05" />
        </label>
      </section>

      <section id="cityPanel" class="hud city-panel" aria-label="世界地景列表">
        <h2>世界 50 個知名地景 <span id="landmarkCount">(50)</span></h2>
        <div id="cityList" class="city-list"></div>
      </section>

      <section class="hud flight-help" aria-label="操作提示">
        <span>左鍵拖曳：轉動視角</span>
        <span>右鍵拖曳：平移巡視</span>
        <span>滾輪：拉近拉遠</span>
        <span>方向鍵 / WASD：飛行</span>
        <span>Q / E：升降</span>
        <span>點擊地景：查看位置</span>
      </section>

      <div id="loadingState" class="loading-state">正在載入地球真實紋理與 50 個地景...</div>
    </main>

    <script src="./js/app.js" type="module"></script>
  </body>
</html>
